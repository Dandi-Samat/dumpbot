version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: kaspi_saas
      POSTGRES_USER: kaspi
      POSTGRES_PASSWORD: kaspi123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://kaspi:kaspi123@db:5432/kaspi_saas
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-please}
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/kaspi:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
